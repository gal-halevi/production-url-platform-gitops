# Loki — monolithic deployment, filesystem storage.
# Suitable for dev: simple to operate, no external dependencies.
# Migrate to scalable + Azure Blob Storage if moving to production.
deploymentMode: SingleBinary

loki:
  auth_enabled: false

  commonConfig:
    replication_factor: 1

  schemaConfig:
    configs:
      - from: "2024-01-01"
        store: tsdb
        object_store: filesystem
        schema: v13
        index:
          prefix: loki_index_
          period: 24h

  storage:
    type: filesystem

  # Only index low-cardinality labels.
  # request_id intentionally excluded — filter it via | json | request_id="..." 
  # after the stream selector to avoid unbounded index growth.
  limits_config:
    ingestion_rate_mb: 4
    ingestion_burst_size_mb: 8

singleBinary:
  replicas: 1
  persistence:
    enabled: true
    size: 5Gi

# Disable components not needed in monolithic mode
backend:
  replicas: 0
read:
  replicas: 0
write:
  replicas: 0

# Disable bundled Grafana datasource — we manage it via our own ConfigMap
# so the Grafana sidecar picks it up alongside our other datasources.
grafana-agent-operator:
  enabled: false
lokiCanary:
  enabled: false

# Chart validates that canary is enabled when tests are enabled.
# Tests are a helm test hook — not meaningful in a GitOps/ArgoCD deployment.
test:
  enabled: false
chunksCache:
  enabled: false
resultsCache:
  enabled: false
