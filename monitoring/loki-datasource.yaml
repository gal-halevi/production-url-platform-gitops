# Grafana datasource for Loki.
# The kube-prometheus-stack Grafana sidecar watches for ConfigMaps with
# label grafana_datasource: "1" in the monitoring namespace and hot-reloads
# them into Grafana — no restart or manual UI configuration required.
apiVersion: v1
kind: ConfigMap
metadata:
  name: loki-datasource
  namespace: monitoring
  labels:
    grafana_datasource: "1"
data:
  loki-datasource.yaml: |-
    apiVersion: 1
    datasources:
      - name: Loki
        type: loki
        access: proxy
        url: http://loki.monitoring.svc.cluster.local:3100
        isDefault: false
        version: 1
        editable: false
        jsonData:
          maxLines: 1000
          # Derived fields let Grafana extract request_id from a log line and
          # turn it into a link — useful for cross-service request tracing.
          derivedFields:
            - name: request_id
              matcherRegex: '"request_id":"([^"]+)"'
              url: ""
